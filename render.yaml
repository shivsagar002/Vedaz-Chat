services:
  # ─── Backend: Node.js Web Service ───────────────────────────────────────────
  - type: web
    name: vedaz-chat-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false   # Set this in the Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false   # Set to your frontend Render URL, e.g. https://vedaz-chat-frontend.onrender.com

  # ─── Frontend: Static Site ───────────────────────────────────────────────────
  - type: web
    name: vedaz-chat-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BACKEND_URL
        sync: false   # Set to your backend Render URL, e.g. https://vedaz-chat-backend.onrender.com
